---
name: Build Druid
run-name: |
  Build Druid (attempt #${{ github.run_attempt }})

on:
  workflow_dispatch:
    inputs:
      skip-publish:
        description: Publish and sign images
        type: boolean
        required: true
        default: false
  schedule:
    - cron: 0 1 1/2 * * # https://crontab.guru/#0_1_1/2_*_*
  push:
    branches: [main]
    tags:
      - "[0-9][0-9].[0-9]+.[0-9]+"
      - "[0-9][0-9].[0-9]+.[0-9]+-rc[0-9]+"
    paths:
      # To check dependencies, run this ( you will need to consider transitive dependencies)
      # bake --product PRODUCT -d | grep -v 'docker buildx bake' | jq '.target | keys[]'
      - druid/**
      - vector/**
      - stackable-base/**
      - java-base/**
      - java-devel/**
      - .github/actions/**
      - .github/workflows/build_druid.yaml
      - .github/workflows/reusable_build_image.yaml

permissions: {}

jobs:
  build_image:
    name: Reusable Workflow
    uses: ./.github/workflows/reusable_build_image.yaml
    secrets:
      harbor-robot-secret: ${{ secrets.HARBOR_ROBOT_SDP_GITHUB_ACTION_BUILD_SECRET }}
      quay-robot-secret: ${{ secrets.QUAY_ROBOT_SDP_GITHUB_ACTION_BUILD_SECRET }}
      slack-token: ${{ secrets.SLACK_CONTAINER_IMAGE_TOKEN }}
    permissions:
      id-token: write
      contents: read
    with:
      product-name: druid
      sdp-version: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0-dev' }}
      registry-namespace: sdp
      # Default to true if not set/empty (if not triggered by workflow_dispatch)
      publish: ${{ !inputs.skip-publish }}
