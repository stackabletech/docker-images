---
name: Pull 3rd party components
description: This actions pulls images from e.g. registry.k8s.io
inputs:
  image:
    description: image to be pulled
    required: true
  architecture:
    description: Architecture of image to be pulled
    required: true

runs:
  using: docker
  steps:
    - name: Pull images
      shell: bash
      run: docker pull "${{ inputs.image }}" --platform "${{ inputs.architecture }}"
