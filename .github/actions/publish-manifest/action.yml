---
name: Publish Product Image Manifest
description: This action publishes a Docker image
inputs:
  product:
    description: The name of the product to publish
    required: true
  image-version:
    description: This is the container image end tag excluding the architecture information (right of ':')
    required: true
  registry:
    description: The destination registry of the manifest list ( e.g. docker.stackable.tech/stackable // oci.stackable.tech/sdp)
    required: true
  nexus-password:
    description: The password to login to Nexus
    required: true
  harbor-secret:
    description: The secret to login to Harbor
    required: true
  digest-arm:
    description: Digest of the ARM image to put into manifest list
  digest-amd:
    description: Digest of the AMD image to put into manifest list

runs:
  using: composite
  steps:
    - name: Set up Cosign
      uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

    - name: Login to Stackable Nexus
      uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
      with:
        registry: docker.stackable.tech
        username: github
        password: ${{ inputs.nexus-password }}

    - name: Login to Stackable Harbor
      uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
      with:
        registry: oci.stackable.tech
        username: robot$sdp+github-action-build
        password: ${{ inputs.harbor-secret }}

    - name: Setup Environment Variables
      shell: bash
      run: |
        set -euo pipefail
        IMAGE_VERSION=${{ inputs.image-version }}
        echo "IMAGE_VERSION=$IMAGE_VERSION" >> $GITHUB_ENV

    - name: Create Manifest
      shell: bash
      run: |
        set -euo pipefail

        # Get the image index digest
        # Eg: index_digest docker.stackable.tech/stackable/hello-world:0.0.1-SNAPSHOT-stackable0.0.0-dev
        #
        # Note: `docker manifest push` currently outputs the same hash, but `manifest` is experimental and the
        # STDOUT is more likely to change than the structured output.
        function index_digest {
          docker buildx imagetools inspect --format '{{println .Manifest.Digest}}' "$1"
        }

        # Directly using inputs might be abused with code injection, TODO: Make env vars out of it - MW 14.08.24
        # Manifest name is created from inputs above. Each registry needs its own step.
        MANIFEST_NAME="${{ inputs.registry }}/${{ inputs.product }}:$IMAGE_VERSION" 
        # If and only if both digests are provided, use them to create manifest list. If not, create manifest list only via tag.
        set -x
        if [[ -n "${{ inputs.digest-arm }}" && -n "${{ inputs.digest-amd }}" ]]; then
          # `docker manifest push` directly returns the digest of the manifest list
          # As it is an experimental feature, this might change in the future
          # Further reading: https://docs.docker.com/reference/cli/docker/manifest/push/
          # --amend because the manifest list would be updated since we use the same tag: 0.0.0-dev
          docker manifest create "$MANIFEST_NAME" --amend "${MANIFEST_NAME}-amd64@${{ inputs.digest-amd }}" --amend "${MANIFEST_NAME}-arm64@${{ inputs.digest-arm }}"
        else
          echo "ARM & AMD image digests not provided. Creating manifest without."
          echo "WARNING: Unsafe to create manifest list without digests. Can't ensure correct image."
          docker manifest create "$MANIFEST_NAME" --amend "${MANIFEST_NAME}-amd64" --amend "${MANIFEST_NAME}-arm64"
        fi
        set +x
        docker manifest push "$MANIFEST_NAME"
        DIGEST=$(index_digest "$MANIFEST_NAME")

        # Refer to image via its digest (oci.stackable.tech/sdp/airflow@sha256:0a1b2c...)
        # This generates a signature and publishes it to the registry, next to the image
        # Uses the keyless signing flow with Github Actions as identity provider
        cosign sign -y "$MANIFEST_NAME@$DIGEST"
